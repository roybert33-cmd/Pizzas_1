<style>

<header><h1>🍕 Cocina Pizzas 1 - Con AppCheck Debug</h1><button onclick="reiniciarTodo()" style="background:white;color:var(--azul);border:none;padding:10px 16px;border-radius:10px;font-weight:800">♻️ Reiniciar día</button></header>

  setInterval(()=>{document.getElementById("c-hora").innerText=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})},1000);

    const visibles=pedidos.filter(p=>p.estado!=="ENTREGADO"); total=pedidos.length;

</script>
