<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente - Pizzas 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--rojo:#E63946;--azul:#1D3557;--amarillo:#FFB703;--bg:#FFF8F0}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px}
  .contenedor{max-width:440px;width:100%;background:white;border-radius:28px;padding:24px;box-shadow:0 20px 50px #1D35571A;text-align:center;position:relative;overflow:hidden}
  .contenedor::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--rojo),var(--amarillo),var(--azul))}
  .brand{font-family:'Fredoka';color:var(--azul);font-size:18px;letter-spacing:1px;margin-bottom:4px} .brand span{color:var(--rojo)}
  h1{font-family:'Fredoka';font-size:26px;color:var(--azul);margin:6px 0 12px;line-height:1.1}
  .numero-grande{font-family:'Fredoka';font-size:72px;color:var(--azul);line-height:1;margin:10px 0}
  .estado-box{font-weight:700;color:var(--azul);background:#F1F5F9;padding:14px;border-radius:14px;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:14px;gap:4px;word-break:break-word}
  .video-cueca{width:100%;border-radius:16px;margin-top:16px;max-height:280px;object-fit:cover}
  .btn{width:100%;padding:16px;border:none;border-radius:14px;font-weight:800;font-size:16px;cursor:pointer;margin-top:12px}
  .btn-amarillo{background:var(--amarillo);color:var(--azul)} .btn-azul{background:var(--azul);color:white}
  .error-box{background:#FEE2E2;color:#991B1B;padding:12px;border-radius:10px;font-size:13px;text-align:left;margin-top:10px}
</style>
</head>
<body>
<div class="contenedor" id="contenedor-principal">
  <div class="brand">PIZZAS <span>1</span> • RETIRO</div>
  <h1 id="titulo">Validando...</h1>
  <div id="numero-view" style="display:none"><div style="color:#888;font-size:12px;letter-spacing:1px">TU TURNO ES</div><div id="num-txt" class="numero-grande">#0</div></div>
  <div id="estado-pantalla" class="estado-box">Cargando...</div>
  <button id="boton-cerrar" class="btn btn-azul" style="display:none" onclick="cerrarSesion()">Entendido, cerrar</button>
  <video id="video-cueca" class="video-cueca" style="display:none" loop muted playsinline preload="auto"><source src="video.mp4" type="video/mp4"></video>
  <p style="font-size:10px;color:#aaa;margin-top:14px">Sistema anti-recarga • Debes escanear el QR del acrílico para nuevo turno</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, off, set, get, remove, runTransaction } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

const firebaseConfig = { apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", authDomain: "avisador-arayapp.firebaseapp.com", databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app", messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002" };
const app = initializeApp(firebaseConfig);
try {
  initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'), isTokenAutoRefreshEnabled: true });
} catch(e){ console.warn("AppCheck init error", e); }

const db=getDatabase(app); const auth=getAuth(app);
const RUTA_BASE='pizzas_1';
const KEY_BLOQUEO = 'pizzas_1_ticket_bloqueado';
const KEY_FECHA = 'pizzas_1_fecha';
const PARAM_ACRILICO = 'local';

let audioCtx=null, intervaloAlarma=null, wakeLock=null, pedidoRefActual=null;

function limpiarURL(){
  const url=new URL(location.href);
  url.searchParams.delete(PARAM_ACRILICO);
  history.replaceState(null,'', url.pathname + url.search);
}
window.cerrarSesion=()=>{
  document.getElementById("contenedor-principal").innerHTML = "<div style='text-align:center;padding:30px'><h2 style='font-family:Fredoka'>Listo</h2><p>Escanea el QR del acrílico si quieres un nuevo turno.</p></div>";
}
function sonarFuerte(){
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=880; gain.gain.setValueAtTime(0.8,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.8);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.8);
    if("vibrate" in navigator) navigator.vibrate([800,200,800]);
  }catch(e){}
}
function escucharPedido(ticketId){
  if(pedidoRefActual) off(pedidoRefActual);
  pedidoRefActual=ref(db, `${RUTA_BASE}/pedidos/${ticketId}`);
  onValue(pedidoRefActual, (snap)=>{
    const data=snap.val();
    const titulo=document.getElementById("titulo");
    const estadoEl=document.getElementById("estado-pantalla");
    const numView=document.getElementById("numero-view");
    const numTxt=document.getElementById("num-txt");
    if(!titulo || !estadoEl) return;
    numView.style.display="block"; numTxt.innerText="#"+ticketId;
    if(!data){
      titulo.innerText="Turno finalizado";
      estadoEl.innerHTML="<h3 style='margin:0'>Tu pedido #"+ticketId+" ya fue entregado</h3><p style='font-size:13px;color:#666'>Para un nuevo pedido debes escanear el QR del acrílico de nuevo.</p>";
      document.getElementById("boton-cerrar").style.display="none";
      document.body.style.background="";
      if(intervaloAlarma) clearInterval(intervaloAlarma);
      return;
    }
    if(data.estado==="ESPERA"){
      titulo.innerText="Pedido en preparación";
      estadoEl.innerHTML="⏳ Pedido #"+ticketId+" en cocina<br><small style='color:#666'>Te avisamos con sonido fuerte</small>";
    }
    if(data.estado==="LISTO"){
      titulo.innerHTML="¡PEDIDO LISTO!";
      estadoEl.innerHTML="<h2 style='font-family:Fredoka;color:#E63946;margin:0'>¡PEDIDO #"+ticketId+" LISTO!</h2><small>Retira en mostrador</small>";
      const video = document.getElementById("video-cueca");
      if(video){ video.style.display="block"; video.play().catch(()=>{}); }
      sonarFuerte();
      let c=0;
      if(intervaloAlarma) clearInterval(intervaloAlarma);
      intervaloAlarma=setInterval(()=>{
        if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
        sonarFuerte(); c++;
        document.body.style.background=(c%2===0)?"#ff0000":"#FFF8F0";
        if(c>30){ clearInterval(intervaloAlarma); document.body.style.background=""; }
      },1500);
      setTimeout(()=>{
        if(intervaloAlarma) clearInterval(intervaloAlarma);
        document.body.style.background="";
        estadoEl.innerHTML="<h3>Entregado</h3><p style='font-size:13px'>Escanea de nuevo para otro pedido</p>";
        if(video) video.style.display="none";
        if(wakeLock) try{wakeLock.release()}catch(e){}
      },30000);
    }
  }, (error)=>{
    document.getElementById("estado-pantalla").innerHTML = `<div class="error-box">Error Firebase: ${error.message}<br>Agrega el dominio roybert33-cmd.github.io en reCAPTCHA Enterprise y en Authentication > Dominios autorizados</div>`;
  });
}
async function generarTurnoNuevo(){
  const titulo=document.getElementById("titulo");
  const estadoEl=document.getElementById("estado-pantalla");
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    await audioCtx.resume();
  }catch(e){}
  if("wakeLock" in navigator) try{ wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
  if("vibrate" in navigator) navigator.vibrate(100);
  try {
    const contadorRef=ref(db, `${RUTA_BASE}/contador`);
    const result=await runTransaction(contadorRef, (current)=>{
      if(current===null) return 1;
      return current+1;
    });
    if(!result.committed) throw new Error("Transacción no confirmada - App Check o Reglas bloqueando");
    const nuevoNumero=result.snapshot.val();
    if(!nuevoNumero) throw new Error("Contador devolvió null");
    const hoy=new Date().toDateString();
    localStorage.setItem(KEY_BLOQUEO, nuevoNumero);
    localStorage.setItem(KEY_FECHA, hoy);
    await set(ref(db, `${RUTA_BASE}/pedidos/${nuevoNumero}`), { estado:"ESPERA", timestamp:Date.now() });
    limpiarURL();
    escucharPedido(nuevoNumero);
  } catch (error) {
    titulo.innerText="Error generando turno";
    estadoEl.innerHTML = `<div class="error-box"><b>Falló la conexión</b><br>Error: ${error.message}<br><br><b>SOLUCIÓN:</b><br>1. console.cloud.google.com > reCAPTCHA Enterprise > Keys > Editar<br>Agrega: <b>roybert33-cmd.github.io</b><br>2. Firebase > Database > Rules: { ".read": true, ".write": true }<br><br><button onclick="location.reload()" style="background:#1D3557;color:white;border:none;padding:10px;border-radius:8px;width:100%;font-weight:800">Reintentar</button></div>`;
  }
}
signInAnonymously(auth).then(async()=>{
  const params=new URLSearchParams(location.search);
  const vieneDeAcrilico=params.get(PARAM_ACRILICO)===RUTA_BASE;
  const ticketGuardado=localStorage.getItem(KEY_BLOQUEO);
  const fechaGuardada=localStorage.getItem(KEY_FECHA);
  const hoy=new Date().toDateString();
  if(ticketGuardado && fechaGuardada!==hoy){
    if(!vieneDeAcrilico){
      localStorage.removeItem(KEY_BLOQUEO);
      localStorage.removeItem(KEY_FECHA);
    }
  }
  const estadoEl=document.getElementById("estado-pantalla");
  const titulo=document.getElementById("titulo");
  if(vieneDeAcrilico){
    titulo.innerText="Asignando tu turno...";
    estadoEl.innerText="Generando número...";
    await generarTurnoNuevo();
    return;
  } else {
    const ticketActual=localStorage.getItem(KEY_BLOQUEO);
    if(ticketActual){
      limpiarURL();
      escucharPedido(ticketActual);
      return;
    } else {
      document.getElementById("contenedor-principal").innerHTML=`
        <div style='text-align:center;padding:30px'>
          <div style='font-size:50px'>⛔</div>
          <h2 style='font-family:Fredoka;color:#1D3557'>Acceso bloqueado</h2>
          <p style='font-size:16px'>Debes escanear el QR del acrílico que está en caja para obtener tu turno.</p>
          <p style='color:#888;font-size:13px'>No puedes recargar la página para sacar otro número.<br>Tienes que escanear de nuevo.</p>
          <div style='margin-top:20px;background:#F1F5F9;padding:12px;border-radius:12px;font-size:12px'>QR esperado:<br><b>?local=pizzas_1</b></div>
        </div>`;
      return;
    }
  }
}).catch(e=>{
  document.getElementById("estado-pantalla").innerHTML = `<div class="error-box">Error Auth: ${e.message}<br>Habilita Anonymous Auth en Firebase > Authentication > Métodos</div>`;
});
</script>
</body>
</html>
